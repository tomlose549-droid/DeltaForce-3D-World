<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D World</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- 进入遮罩 -->
  <div id="overlay">
    <h2>3D World</h2>
    <div class="setting-row">
      <label>视角灵敏度</label>
      <input type="range" id="sensitivity" min="0.2" max="3.0" step="0.1" value="1.0">
      <span id="sens-val">1.0</span>
    </div>
    <button id="enter-btn">点击进入</button>
    <p>WASD 移动 &nbsp;·&nbsp; Shift 加速 &nbsp;·&nbsp; 鼠标转动视角 &nbsp;·&nbsp; ESC 退出</p>
  </div>

  <!-- 准星 -->
  <div id="crosshair"></div>

  <!-- 交互提示 -->
  <div id="interact-hint">⬜ 按 [空格] 交互</div>

  <!-- 卡牌 2D 界面 -->
  <div id="card-ui">
    <div class="rainbow-bg"></div>
    <div class="rainbow-lines"></div>

    <!-- 顶部按钮行 -->
    <div class="ui-buttons">
      <button class="ui-btn" id="btn-exit">✕</button>
      <button class="ui-btn" id="btn-draw">抽卡</button>
      <button class="ui-btn" id="btn-container">容器</button>
    </div>

    <!-- 抽卡子面板（2列网格）-->
    <div id="panel-draw" class="panel" style="display:none">
      <div class="panel-grid">
        <button class="ui-btn loc-btn" data-loc="常规零号大坝">常规零号大坝</button>
        <button class="ui-btn loc-btn" data-loc="机密巴克十">机密巴克十</button>
        <button class="ui-btn loc-btn" data-loc="机密航天基地">机密航天基地</button>
        <button class="ui-btn loc-btn" data-loc="绝密巴克十">绝密巴克十</button>
        <button class="ui-btn loc-btn" data-loc="绝密航天基地">绝密航天基地</button>
        <button class="ui-btn loc-btn" data-loc="绝密潮汐监狱">绝密潮汐监狱</button>
      </div>
    </div>

    <!-- 容器子面板（横排）-->
    <div id="panel-container" class="panel" style="display:none">
      <div class="panel-row">
        <button class="ui-btn">常规</button>
        <button class="ui-btn">机密</button>
        <button class="ui-btn">绝密</button>
      </div>
    </div>

    <!-- 集装箱开箱面板 -->
    <div id="panel-shipping" style="display:none">
      <div class="shipping-row" id="shipping-row"></div>
      <button class="ui-btn" id="btn-confirm-ship">✓ 确认收取</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // ── 场景基础 ──────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdce3e8);
    scene.fog = new THREE.FogExp2(0xdce3e8, 0.003);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 2000);
    camera.position.set(0, 1.7, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;  // sRGB 输出矫正
    document.body.appendChild(renderer.domElement);

    // 地板网格
    scene.add(new THREE.GridHelper(2000, 200, 0x888888, 0x555555));

    // 灯光
    scene.add(new THREE.AmbientLight(0xffffff, 1.1));
    const sun = new THREE.DirectionalLight(0xffffff, 0.55);
    sun.position.set(5, 12, 8);
    scene.add(sun);
    // 半球光：天空漫反射补光，减少暗部过暗
    const hemi = new THREE.HemisphereLight(0xffffff, 0xe8e8e8, 0.5);
    scene.add(hemi);

    // ── 大理石贴图（marble.jpg）────────────────────────────
    const loader = new THREE.TextureLoader();
    const baseMarble = loader.load('./marble.jpg');
    baseMarble.wrapS      = baseMarble.wrapT = THREE.RepeatWrapping;
    baseMarble.colorSpace = THREE.SRGBColorSpace;          // sRGB 色彩空间
    baseMarble.anisotropy = renderer.capabilities.getMaxAnisotropy(); // 各向异性过滤

    function wallMat(rx, ry) {
      const tex = baseMarble.clone();
      tex.wrapS      = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.repeat.set(rx, ry);
      tex.needsUpdate = true;
      return new THREE.MeshStandardMaterial({  // PBR 材质
        map:       tex,
        roughness: 0.45,
        metalness: 0.0,
      });
    }

    // ── 围墙（内侧 20×20，高 3，厚 1）────────────────────
    // 北墙（玩家正前方，z = -10.5），宽 22 含角落
    const northWall = new THREE.Mesh(new THREE.BoxGeometry(22, 3, 1), wallMat(1.8, 1));
    northWall.position.set(0, 1.5, -10.5);
    scene.add(northWall);

    // 南墙
    const southWall = new THREE.Mesh(new THREE.BoxGeometry(22, 3, 1), wallMat(1.8, 1));
    southWall.position.set(0, 1.5, 10.5);
    scene.add(southWall);

    // 东墙（长 20）
    const eastWall = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 20), wallMat(1.6, 1));
    eastWall.position.set(10.5, 1.5, 0);
    scene.add(eastWall);

    // 西墙
    const westWall = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 20), wallMat(1.6, 1));
    westWall.position.set(-10.5, 1.5, 0);
    scene.add(westWall);

    // 碰撞边界（内壁 ±10，减去玩家半径 0.3）
    const BOUND = 9.7;

    // ── 天空立方体（12 个半透明黑色玻璃方块）────────────
    const skyCubes = [];
    const glassMat = new THREE.MeshStandardMaterial({
      color: 0x050814,
      transparent: true,
      opacity: 0.42,
      roughness: 0.04,
      metalness: 0.25,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    const edgeMat = new THREE.LineBasicMaterial({
      color: 0x4455cc,
      transparent: true,
      opacity: 0.55,
    });

    for (let i = 0; i < 12; i++) {
      const size = 20 + Math.random() * 8;           // 20~28 格
      const geo  = new THREE.BoxGeometry(size, size, size);
      const cube = new THREE.Mesh(geo, glassMat);

      cube.position.set(
        (Math.random() - 0.5) * 160,
        52 + Math.random() * 12,                     // 高度 52~64
        (Math.random() - 0.5) * 160
      );
      cube.rotation.set(
        Math.random() * Math.PI,
        Math.random() * Math.PI,
        Math.random() * Math.PI
      );

      // 边框线条
      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo), edgeMat
      );
      cube.add(edges);

      cube.userData = {
        vx: (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.15,
        vz: (Math.random() - 0.5) * 0.8,
        rx: (Math.random() - 0.5) * 0.12,
        ry: (Math.random() - 0.5) * 0.18,
        rz: (Math.random() - 0.5) * 0.08,
        baseY: 52 + Math.random() * 12,
      };

      scene.add(cube);
      skyCubes.push(cube);
    }

    function updateSkyCubes(dt) {
      for (const cube of skyCubes) {
        const u = cube.userData;
        cube.position.x += u.vx * dt;
        cube.position.y += u.vy * dt;
        cube.position.z += u.vz * dt;
        cube.rotation.x += u.rx * dt;
        cube.rotation.y += u.ry * dt;
        cube.rotation.z += u.rz * dt;
        // 漂移边界反弹
        if (Math.abs(cube.position.x) > 120) u.vx *= -1;
        if (Math.abs(cube.position.z) > 120) u.vz *= -1;
        if (Math.abs(cube.position.y - u.baseY) > 8) u.vy *= -1;
      }
    }

    // ── 卡牌强度图（黑底 + 霓虹辉光遮罩）────────────────
    function makeCardIntensityMap() {
      const W = 256, H = 384;
      const cv = document.createElement('canvas');
      cv.width = W; cv.height = H;
      const c = cv.getContext('2d');

      c.fillStyle = 'black';
      c.fillRect(0, 0, W, H);

      // 外框辉光层（模糊）
      c.filter = 'blur(10px)';
      c.strokeStyle = 'rgba(255,255,255,0.7)';
      c.lineWidth = 28;
      c.beginPath(); c.roundRect(14, 14, W-28, H-28, 20); c.stroke();

      // "?" 辉光层（模糊）
      c.filter = 'blur(12px)';
      c.fillStyle = 'rgba(255,255,255,0.55)';
      c.font = 'bold 170px serif';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('?', W/2, H/2 + 14);

      // 外框清晰层
      c.filter = 'none';
      c.strokeStyle = 'white';
      c.lineWidth = 9;
      c.beginPath(); c.roundRect(14, 14, W-28, H-28, 20); c.stroke();

      // "?" 清晰层
      c.fillStyle = 'white';
      c.font = 'bold 170px serif';
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('?', W/2, H/2 + 14);

      return new THREE.CanvasTexture(cv);
    }

    // ── 卡牌网格（霓虹彩虹 Shader）────────────────────────
    const cardMat = new THREE.ShaderMaterial({
      uniforms: {
        uTime:  { value: 0.0 },
        uMask:  { value: makeCardIntensityMap() },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform sampler2D uMask;
        varying vec2 vUv;
        vec3 rainbow(float t) {
          return 0.5 + 0.5 * cos(6.28318 * (t + vec3(0.0, 0.333, 0.667)));
        }
        void main() {
          float intensity = texture2D(uMask, vUv).r;
          vec3 color = rainbow(uTime * 0.35) * intensity;
          gl_FragColor = vec4(color, 1.0);
        }
      `,
    });

    const cardMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.75), cardMat);
    cardMesh.position.set(0, 1.7, -9.97);
    scene.add(cardMesh);

    // ── 控制器 ────────────────────────────────────────────
    const controls = new PointerLockControls(camera, document.body);
    scene.add(controls.getObject());

    const overlay      = document.getElementById('overlay');
    const enterBtn     = document.getElementById('enter-btn');
    const sensSlider   = document.getElementById('sensitivity');
    const sensLabel    = document.getElementById('sens-val');
    const interactHint = document.getElementById('interact-hint');
    const cardUI       = document.getElementById('card-ui');

    controls.pointerSpeed = 1.0;
    sensSlider.addEventListener('input', () => {
      const v = parseFloat(sensSlider.value);
      sensLabel.textContent = v.toFixed(1);
      controls.pointerSpeed = v;
    });

    let cardUIOpen = false;

    enterBtn.addEventListener('click', () => controls.lock());

    controls.addEventListener('lock', () => {
      overlay.style.display = 'none';
    });
    controls.addEventListener('unlock', () => {
      // 只有当卡牌界面未打开时才显示主遮罩
      if (!cardUIOpen) overlay.style.display = 'flex';
    });

    // ── 卡牌界面开关 ─────────────────────────────────────
    function openCardUI() {
      cardUIOpen = true;
      controls.unlock();
      cardUI.style.display = 'flex';
      interactHint.style.display = 'none';
    }
    function closeCardUI() {
      resetPanels();
      cardUI.style.display = 'none';
      cardUIOpen = false;
      controls.lock();
    }

    const panelDraw      = document.getElementById('panel-draw');
    const panelContainer = document.getElementById('panel-container');
    const panelShipping  = document.getElementById('panel-shipping');
    const shippingRow    = document.getElementById('shipping-row');
    const btnDraw        = document.getElementById('btn-draw');
    const btnContainer   = document.getElementById('btn-container');

    function resetPanels() {
      panelDraw.style.display      = 'none';
      panelContainer.style.display = 'none';
      panelShipping.style.display  = 'none';
      btnDraw.style.display        = '';
      btnContainer.style.display   = '';
    }

    document.getElementById('btn-exit').addEventListener('click', closeCardUI);

    btnDraw.addEventListener('click', () => {
      panelDraw.style.display      = 'block';
      panelContainer.style.display = 'none';
      btnDraw.style.display        = 'none';   // 隐藏抽卡，保留容器
    });

    btnContainer.addEventListener('click', () => {
      panelContainer.style.display = 'block';
      panelDraw.style.display      = 'none';
      btnContainer.style.display   = 'none';   // 隐藏容器，保留抽卡
    });

    // ── 按键 ─────────────────────────────────────────────
    const keys = new Set();
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (controls.isLocked && aimingAtCard) openCardUI();
      }
      keys.add(e.code);
    });
    document.addEventListener('keyup', e => keys.delete(e.code));

    const isMoving = () => keys.has('KeyW') || keys.has('KeyS') || keys.has('KeyA') || keys.has('KeyD');
    const isShift  = () => keys.has('ShiftLeft') || keys.has('ShiftRight');

    // ── 准星射线检测 ──────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    let aimingAtCard = false;

    function checkCardAim() {
      raycaster.setFromCamera({ x: 0, y: 0 }, camera);
      const hits = raycaster.intersectObject(cardMesh);
      if (hits.length > 0 && hits[0].distance < 5) {
        if (!aimingAtCard) interactHint.style.display = 'block';
        aimingAtCard = true;
      } else {
        if (aimingAtCard) interactHint.style.display = 'none';
        aimingAtCard = false;
      }
    }

    // ── 脚步音效（室内硬地板 + 左右脚交替）────────────────
    let audioCtx = null;
    const getACtx = () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    };

    function playFootstep(isLeft) {
      const ctx = getACtx();
      const sr  = ctx.sampleRate;

      // 冲击噪声（极快衰减模拟硬地板撞击）
      const impLen = Math.floor(sr * 0.045);
      const buf    = ctx.createBuffer(1, impLen, sr);
      const d      = buf.getChannelData(0);
      for (let i = 0; i < impLen; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / impLen, 14);
      }

      const src = ctx.createBufferSource();
      src.buffer = buf;

      // 带通滤波：突出大理石地板的清脆频段，左右脚略有不同
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = isLeft ? 1900 : 2300;
      bp.Q.value = 1.4;

      // 高通：去除低频轰鸣
      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 700;

      // 短延迟模拟室内硬墙反射（回响）
      const delay = ctx.createDelay(0.15);
      delay.delayTime.value = isLeft ? 0.032 : 0.038;

      const echoGain = ctx.createGain();
      echoGain.gain.value = 0.18;

      const master = ctx.createGain();
      master.gain.value = 0.52;

      // 直达声路径
      src.connect(hp); hp.connect(bp); bp.connect(master);
      // 回响路径
      bp.connect(delay); delay.connect(echoGain); echoGain.connect(master);
      master.connect(ctx.destination);
      src.start();
    }

    let stepTimer  = 0;
    let isLeftFoot = true;
    function updateFootstep(dt) {
      if (!isMoving()) { stepTimer = 0; isLeftFoot = true; return; }
      const interval = isShift() ? 1 / 3 : 1 / 1.5;
      stepTimer += dt;
      if (stepTimer >= interval) {
        stepTimer -= interval;
        playFootstep(isLeftFoot);
        isLeftFoot = !isLeftFoot;
      }
    }

    // ── 粒子系统 ──────────────────────────────────────────
    const MAX_P = 800, LIFETIME = 2.0;
    const posArr = new Float32Array(MAX_P * 3);
    const alpArr = new Float32Array(MAX_P);
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    pGeo.setAttribute('alpha',    new THREE.BufferAttribute(alpArr, 1));
    const pMat = new THREE.ShaderMaterial({
      vertexShader: `
        attribute float alpha; varying float vA;
        void main() {
          vA = alpha;
          gl_PointSize = 4.0;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: `
        varying float vA;
        void main() {
          if (length(gl_PointCoord - 0.5) > 0.5) discard;
          gl_FragColor = vec4(1.0, 1.0, 1.0, vA);
        }`,
      transparent: true, depthWrite: false,
    });
    scene.add(new THREE.Points(pGeo, pMat));

    const pool = Array.from({ length: MAX_P }, () =>
      ({ active: false, x:0, y:0, z:0, vx:0, vy:0, vz:0, life:0 }));

    function spawnBatch() {
      const count = Math.floor(Math.random()*21) + 10;
      let n = 0;
      for (let i = 0; i < MAX_P && n < count; i++) {
        if (pool[i].active) continue;
        const p = pool[i], a = Math.random()*Math.PI*2, r = Math.random()*1.5;
        p.active=true; p.life=0;
        p.x = camera.position.x + Math.cos(a)*r;
        p.y = 0.05 + Math.random()*0.1;
        p.z = camera.position.z + Math.sin(a)*r;
        p.vx = (Math.random()-0.5)*0.6;
        p.vy = Math.random()*1.2 + 0.4;
        p.vz = (Math.random()-0.5)*0.6;
        n++;
      }
    }
    let spawnTimer = 0;
    function updateParticles(dt, locked) {
      if (locked && isMoving()) {
        spawnTimer += dt;
        if (spawnTimer >= 0.05) { spawnTimer -= 0.05; spawnBatch(); }
      } else spawnTimer = 0;

      for (let i = 0; i < MAX_P; i++) {
        const p = pool[i];
        if (!p.active) { posArr[i*3+1] = -9999; alpArr[i] = 0; continue; }
        p.life += dt;
        if (p.life >= LIFETIME) { p.active=false; posArr[i*3+1]=-9999; alpArr[i]=0; continue; }
        p.vy = Math.max(0, p.vy - 0.5*dt);
        p.x += p.vx*dt; p.y += p.vy*dt; p.z += p.vz*dt;
        posArr[i*3]=p.x; posArr[i*3+1]=p.y; posArr[i*3+2]=p.z;
        alpArr[i] = 1.0 - p.life/LIFETIME;
      }
      pGeo.attributes.position.needsUpdate = true;
      pGeo.attributes.alpha.needsUpdate    = true;
    }

    // ── 战利品数据 ────────────────────────────────────────
    const LOCATION_DATA = {
      '常规零号大坝': {
        countTable: [[2,25],[3,15],[4,60]],
        lootTable: [
          ['垃圾桶',25],['抽屉柜',14],['手提箱',10],['高级旅行箱',10],
          ['电脑机箱',8],['武器箱',5],['航空储物箱',3],['快递箱',9],
          ['医疗物资堆',3],['电脑',1.5],['小保险箱',1.5],['服务器',1.5],
          ['大保险箱',0.5],['鸟窝',8]
        ]
      },
      '机密巴克十': {
        countTable: [[3,30],[4,66],[5,4]],
        lootTable: [
          ['航空储物箱',2],['鸟窝',8.5],['沙色大保险',0.1],['垃圾桶',20],
          ['抽屉柜',5],['快递箱',10],['服务器',1.5],['手提箱',15],
          ['高级旅行箱',15],['医疗物资堆',5],['电脑',2],['电脑机箱',2],
          ['武器箱',10],['小保险箱',2.3],['大保险箱',0.6]
        ]
      },
      '机密航天基地': {
        countTable: [[3,40],[4,35],[5,25]],
        lootTable: [
          ['垃圾桶',19],['抽屉柜',6],['手提箱',10],['高级旅行箱',10],
          ['电脑机箱',10],['武器箱',10],['航空储物箱',4],['快递箱',5],
          ['医疗物资堆',5],['电脑',2],['小保险箱',1],['服务器',2],
          ['大保险箱',0.7],['鸟窝',9.3],['火箭返回舱',6]
        ]
      },
      '绝密巴克十': {
        countTable: [[3,32],[4,58],[5,10]],
        lootTable: [
          ['航空储物箱',3],['鸟窝',10.5],['沙色大保险',1.2],['垃圾桶',10],
          ['抽屉柜',7],['快递箱',10],['服务器',1.5],['手提箱',15],
          ['高级旅行箱',15],['医疗物资堆',6],['电脑',2.5],['电脑机箱',3],
          ['武器箱',11],['小保险箱',3.5],['大保险箱',1.8]
        ]
      },
      '绝密航天基地': {
        countTable: [[3,25],[4,30],[5,40],[6,5]],
        lootTable: [
          ['垃圾桶',6],['抽屉柜',8],['手提箱',10],['高级旅行箱',10],
          ['电脑机箱',12],['武器箱',10],['航空储物箱',5],['快递箱',5],
          ['医疗物资堆',6],['电脑',3],['小保险箱',1.5],['服务器',3],
          ['大保险箱',1.2],['鸟窝',12.3],['火箭返回舱',7]
        ]
      },
      '绝密潮汐监狱': {
        countTable: [[4,35],[5,45],[6,20]],
        lootTable: [
          ['抽屉柜',10],['手提箱',12],['电脑机箱',10],['武器箱',24.9],
          ['航空储物箱',8],['快递箱',3],['医疗物资堆',8],['电脑',5],
          ['小保险箱',4],['服务器',3.5],['大保险箱',3.2],['鸟窝',1],
          ['三角蚌',16.3],['典狱长的审判',1.1]
        ]
      }
    };

    // 带权重随机选取
    function weightedRandom(table) {
      const total = table.reduce((s, [, w]) => s + w, 0);
      let r = Math.random() * total;
      for (const [item, w] of table) {
        r -= w;
        if (r <= 0) return item;
      }
      return table[table.length - 1][0];
    }

    // ── 物品图标（Canvas 生成 + 缓存）──────────────────────
    const iconCache = {};
    function makeItemIcon(name) {
      if (iconCache[name]) return iconCache[name];
      const S = 100;
      const cv = document.createElement('canvas');
      cv.width = cv.height = S;
      drawItemIcon(cv.getContext('2d'), name, S);
      iconCache[name] = cv;
      return cv;
    }

    function drawItemIcon(c, name, S) {
      const fill  = (x,y,w,h,rad=0) => { c.beginPath(); if(rad) c.roundRect(x,y,w,h,rad); else c.rect(x,y,w,h); c.fill(); };
      const line  = (x1,y1,x2,y2) => { c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke(); };
      const arc   = (x,y,r,fill_=true) => { c.beginPath(); c.arc(x,y,r,0,Math.PI*2); fill_?c.fill():c.stroke(); };
      // 背景
      c.fillStyle = '#181818'; c.fillRect(0,0,S,S);

      switch (name) {
        case '垃圾桶': {
          // 灰色圆柱桶
          c.fillStyle='#5a5a5a'; fill(22,34,56,52,4);           // 桶身
          c.fillStyle='#3a3a3a'; fill(18,30,64,10,3);            // 桶盖
          c.fillStyle='#666';    fill(36,22,28,10,3);            // 提手根部
          c.strokeStyle='#3a3a3a'; c.lineWidth=2;
          for(let i=0;i<4;i++) line(22,48+i*9,78,48+i*9);       // 横纹
          c.strokeStyle='#888'; c.lineWidth=1; c.beginPath(); c.roundRect(18,30,64,10,3); c.stroke();
          break;
        }
        case '抽屉柜': {
          c.fillStyle='#6b4423'; fill(14,18,72,68,4);            // 柜体
          c.fillStyle='#7d5232';
          for(let i=0;i<3;i++) fill(18,22+i*22,64,18,2);         // 抽屉面
          c.strokeStyle='#4a2a10'; c.lineWidth=1;
          for(let i=0;i<3;i++) { c.beginPath(); c.roundRect(18,22+i*22,64,18,2); c.stroke(); }
          c.fillStyle='#c8a464';
          for(let i=0;i<3;i++) arc(50,31+i*22,4);               // 把手
          break;
        }
        case '手提箱': {
          c.fillStyle='#7a4f2a'; fill(12,32,76,50,6);
          c.strokeStyle='#4a2a0a'; c.lineWidth=4; c.lineCap='round';
          c.beginPath(); c.arc(50,32,18,Math.PI,0); c.stroke();  // 提手弧
          c.fillStyle='#c8a050'; fill(40,50,20,10,2);             // 扣锁
          c.strokeStyle='#4a2a0a'; c.lineWidth=2; line(12,54,88,54); // 分割线
          break;
        }
        case '高级旅行箱': {
          c.fillStyle='#1e2d6b'; fill(14,20,72,62,6);
          c.strokeStyle='#c8a050'; c.lineWidth=2; c.beginPath(); c.roundRect(14,20,72,62,6); c.stroke();
          line(14,48,86,48);
          c.strokeStyle='#c8a050'; c.lineWidth=3; c.beginPath(); c.arc(50,20,14,Math.PI,0); c.stroke();
          c.fillStyle='#444'; arc(26,82,6); arc(74,82,6);         // 轮子
          break;
        }
        case '电脑机箱': {
          c.fillStyle='#686868'; fill(24,12,52,76,4);
          c.fillStyle='#888'; fill(28,16,44,8,2);
          c.fillStyle='#4a4a4a'; fill(30,28,18,3); fill(30,34,18,3);
          c.fillStyle='#2a9'; arc(66,28,5);  // 电源键
          c.fillStyle='#4f4'; arc(66,38,3);  // LED
          c.strokeStyle='#3a3a3a'; c.lineWidth=1;
          for(let i=0;i<8;i++) line(28,55+i*4,72,55+i*4);
          break;
        }
        case '武器箱': {
          c.fillStyle='#2d4a1e'; fill(10,20,80,60,4);
          // 斜条纹
          c.strokeStyle='rgba(0,0,0,0.45)'; c.lineWidth=7;
          c.save(); c.beginPath(); c.roundRect(10,20,80,60,4); c.clip();
          for(let i=-6;i<12;i++) line(i*14,20,i*14+70,80);
          c.restore();
          c.strokeStyle='#c8a050'; c.lineWidth=2; c.beginPath(); c.roundRect(10,20,80,60,4); c.stroke();
          c.fillStyle='#b8922a'; fill(20,46,14,8,2); fill(66,46,14,8,2); // 箱扣
          break;
        }
        case '航空储物箱': {
          c.fillStyle='#aab4c4'; fill(10,18,80,64,3);
          // 铆钉
          c.fillStyle='#8898a8';
          [[14,22],[84,22],[14,78],[84,78],[14,50],[84,50]].forEach(([rx,ry])=>arc(rx,ry,3));
          c.fillStyle='#3a6aaa'; fill(10,47,80,8);               // 蓝色条
          c.strokeStyle='#90a0b8'; c.lineWidth=1; c.beginPath(); c.roundRect(10,18,80,64,3); c.stroke();
          break;
        }
        case '快递箱': {
          c.fillStyle='#c8922a'; fill(12,22,76,64,3);
          c.fillStyle='#b8801a'; fill(12,22,36,16,2); fill(52,22,36,16,2); // 箱盖折片
          c.fillStyle='#d8b860'; fill(40,22,20,64);               // 胶带
          c.strokeStyle='#a07020'; c.lineWidth=1; line(40,22,40,86); line(60,22,60,86);
          break;
        }
        case '医疗物资堆': {
          c.fillStyle='#dde'; fill(10,40,52,42,3);               // 底箱
          c.fillStyle='#eef'; fill(18,22,64,42,3);               // 顶箱
          c.fillStyle='#dd2020'; fill(38,28,10,30); fill(24,38,38,10); // 红十字
          break;
        }
        case '电脑': {
          c.fillStyle='#2a2a2a'; fill(12,14,76,50,5);            // 显示器框
          c.fillStyle='#0a1828'; fill(16,18,68,42,3);             // 屏幕
          c.fillStyle='#1a3a6a'; fill(16,18,68,20,3);             // 屏幕发光
          c.fillStyle='#3a3a3a'; fill(40,64,20,8); fill(28,72,44,5,2); // 底座
          c.fillStyle='#3a3a3a'; fill(18,80,64,12,2);             // 键盘
          c.fillStyle='#555';
          for(let kx=0;kx<8;kx++) for(let ky=0;ky<2;ky++) fill(21+kx*7,82+ky*4,5,3,1);
          break;
        }
        case '小保险箱': {
          c.fillStyle='#2a2a2a'; fill(16,20,68,62,5);
          c.strokeStyle='#555'; c.lineWidth=1; c.beginPath(); c.roundRect(20,24,60,54,3); c.stroke();
          c.fillStyle='#555'; arc(50,52,16);
          c.fillStyle='#333'; arc(50,52,10);
          c.fillStyle='#888'; arc(50,52,4);
          c.strokeStyle='#777'; c.lineWidth=3;
          c.beginPath(); c.arc(74,52,8,-Math.PI*0.6,Math.PI*0.6); c.stroke();
          break;
        }
        case '服务器': {
          c.fillStyle='#111'; fill(10,10,80,80,4);
          for(let i=0;i<5;i++){
            c.fillStyle='#222'; fill(14,14+i*15,72,12,2);
            c.fillStyle=i%2===0?'#0f0':'#0af'; arc(20,20+i*15,3);
            c.fillStyle='#0af'; arc(28,20+i*15,3);
          }
          break;
        }
        case '大保险箱': {
          c.fillStyle='#1e1e1e'; fill(10,12,80,76,5);
          c.strokeStyle='#444'; c.lineWidth=2; c.beginPath(); c.roundRect(14,16,72,68,3); c.stroke();
          c.fillStyle='#444'; arc(50,52,22);
          c.fillStyle='#2a2a2a'; arc(50,52,14);
          c.strokeStyle='#666'; c.lineWidth=2;
          for(let a=0;a<8;a++){
            const ang=(a/8)*Math.PI*2;
            line(50+Math.cos(ang)*15,52+Math.sin(ang)*15,50+Math.cos(ang)*20,52+Math.sin(ang)*20);
          }
          c.fillStyle='#888'; arc(50,52,5);
          c.strokeStyle='#666'; c.lineWidth=4; c.beginPath(); c.arc(82,52,10,-Math.PI*0.5,Math.PI*0.5); c.stroke();
          break;
        }
        case '鸟窝': {
          c.fillStyle='#6b4020';
          c.beginPath(); c.ellipse(50,64,36,16,0,0,Math.PI*2); c.fill();
          c.strokeStyle='#8b5a30'; c.lineWidth=2;
          for(let i=0;i<7;i++){
            c.beginPath(); c.moveTo(16+i*2,60-i); c.quadraticCurveTo(50,50-i*2,84-i*2,60-i); c.stroke();
          }
          c.fillStyle='#e8e4d0';
          c.beginPath(); c.ellipse(42,60,8,10,-0.3,0,Math.PI*2); c.fill();
          c.beginPath(); c.ellipse(56,59,8,10,0.3,0,Math.PI*2); c.fill();
          c.beginPath(); c.ellipse(50,64,7,9,0,0,Math.PI*2); c.fill();
          break;
        }
        case '火箭返回舱': {
          c.fillStyle='#c0c8d0';
          c.beginPath(); c.moveTo(35,76); c.lineTo(65,76); c.lineTo(70,50);
          c.arc(50,30,22,0.3,Math.PI-0.3); c.lineTo(30,50); c.closePath(); c.fill();
          c.fillStyle='#1a3a6a'; arc(50,38,12);
          c.strokeStyle='#889'; c.lineWidth=2; arc(50,38,12,false);
          c.fillStyle='#4a3a20';
          c.beginPath(); c.moveTo(30,77); c.lineTo(70,77); c.arc(50,77,20,0,Math.PI); c.closePath(); c.fill();
          break;
        }
        case '沙色大保险': {
          c.fillStyle='#c8a850'; fill(10,12,80,76,5);
          c.strokeStyle='#a88830'; c.lineWidth=2; c.beginPath(); c.roundRect(14,16,72,68,3); c.stroke();
          c.fillStyle='#9a7820'; arc(50,52,20);
          c.fillStyle='#7a5a10'; arc(50,52,12);
          c.strokeStyle='#d8b840'; c.lineWidth=2;
          for(let a=0;a<8;a++){
            const ang=(a/8)*Math.PI*2;
            line(50+Math.cos(ang)*13,52+Math.sin(ang)*13,50+Math.cos(ang)*18,52+Math.sin(ang)*18);
          }
          c.fillStyle='#e8c850'; arc(50,52,4);
          c.strokeStyle='#a88830'; c.lineWidth=4; c.beginPath(); c.arc(82,52,10,-Math.PI*0.5,Math.PI*0.5); c.stroke();
          break;
        }
        case '三角蚌': {
          c.fillStyle='#2a1a4a';
          c.beginPath(); c.moveTo(50,12); c.lineTo(86,82); c.lineTo(14,82); c.closePath(); c.fill();
          c.fillStyle='#4a2a8a';
          c.beginPath(); c.moveTo(50,24); c.lineTo(78,76); c.lineTo(22,76); c.closePath(); c.fill();
          c.strokeStyle='#7a5abb'; c.lineWidth=1;
          for(let i=1;i<=5;i++){
            const y=24+i*9, hw=(i/6)*26;
            line(50-hw,y,50+hw,y);
          }
          c.fillStyle='#50ffee'; arc(50,62,8);
          c.fillStyle='rgba(255,255,255,0.55)'; arc(47,60,4);
          break;
        }
        case '典狱长的审判': {
          // 链条
          c.strokeStyle='#c8a020'; c.lineWidth=2;
          for(let i=0;i<4;i++){ c.beginPath(); c.ellipse(22+i*12,72,5,3,0.4,0,Math.PI*2); c.stroke(); }
          // 锤柄
          c.strokeStyle='#7a4a1a'; c.lineWidth=6; c.lineCap='round';
          line(28,74,76,28);
          // 锤头
          c.fillStyle='#c8a020';
          c.save(); c.translate(66,26); c.rotate(-Math.PI*0.25);
          fill(-24,-10,48,20,4); c.restore();
          // 红色印章星
          c.fillStyle='#e02020';
          c.beginPath();
          for(let p=0;p<10;p++){
            const ang=(p/10)*Math.PI*2-Math.PI/2;
            const R=p%2===0?14:6;
            p===0?c.moveTo(24+Math.cos(ang)*R,22+Math.sin(ang)*R)
                 :c.lineTo(24+Math.cos(ang)*R,22+Math.sin(ang)*R);
          }
          c.closePath(); c.fill();
          break;
        }
        default: {
          c.fillStyle='#3a3a3a'; fill(20,20,60,60,8);
          c.fillStyle='#888'; c.font='bold 28px Arial'; c.textAlign='center'; c.textBaseline='middle';
          c.fillText('?',S/2,S/2);
        }
      }
    }

    // ── 集装箱面板逻辑 ──────────────────────────────────────
    function openShippingPanel(locName) {
      const data  = LOCATION_DATA[locName];
      const count = weightedRandom(data.countTable);  // 返回数量

      // 隐藏抽卡面板和顶部两个按钮
      panelDraw.style.display  = 'none';
      btnDraw.style.display    = 'none';
      btnContainer.style.display = 'none';

      // 清空集装箱行
      shippingRow.innerHTML = '';

      // 生成 N 个集装箱格
      for (let i = 0; i < count; i++) {
        const slot = document.createElement('div');
        slot.className = 'crate-slot';

        const crateBtn = document.createElement('button');
        crateBtn.className = 'crate-btn';

        crateBtn.addEventListener('click', () => {
          const itemName = weightedRandom(data.lootTable);

          // 生成图标 canvas
          const srcIcon = makeItemIcon(itemName);
          const cv = document.createElement('canvas');
          cv.width = cv.height = 100;
          cv.getContext('2d').drawImage(srcIcon, 0, 0);

          const nameEl = document.createElement('div');
          nameEl.className = 'item-name';
          nameEl.textContent = itemName;

          const itemSlot = document.createElement('div');
          itemSlot.className = 'item-slot';
          itemSlot.appendChild(cv);
          itemSlot.appendChild(nameEl);

          slot.innerHTML = '';
          slot.appendChild(itemSlot);
        });

        slot.appendChild(crateBtn);
        shippingRow.appendChild(slot);
      }

      panelShipping.style.display = 'flex';
    }

    // ✓ 按钮 → 返回抽卡面板
    document.getElementById('btn-confirm-ship').addEventListener('click', () => {
      panelShipping.style.display = 'none';
      panelDraw.style.display     = 'block';
      btnContainer.style.display  = '';
      // btnDraw 保持隐藏（已在抽卡子面板内）
    });

    // 地点按钮点击
    document.querySelectorAll('.loc-btn').forEach(btn => {
      btn.addEventListener('click', () => openShippingPanel(btn.dataset.loc));
    });

    // ── 主循环 ────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt     = clock.getDelta();
      const locked = controls.isLocked;

      if (locked) {
        const dist = (isShift() ? 18 : 6) * dt;
        if (keys.has('KeyW')) controls.moveForward(dist);
        if (keys.has('KeyS')) controls.moveForward(-dist);
        if (keys.has('KeyA')) controls.moveRight(-dist);
        if (keys.has('KeyD')) controls.moveRight(dist);

        // 碰撞：限制在围墙内
        camera.position.x = Math.max(-BOUND, Math.min(BOUND, camera.position.x));
        camera.position.z = Math.max(-BOUND, Math.min(BOUND, camera.position.z));

        updateFootstep(dt);
        checkCardAim();
      } else {
        interactHint.style.display = 'none';
        aimingAtCard = false;
      }

      // 卡牌彩虹时间
      cardMat.uniforms.uTime.value += dt;

      updateParticles(dt, locked);
      updateSkyCubes(dt);
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
