<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D World</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- 进入遮罩 -->
  <div id="overlay">
    <h2>3D World</h2>
    <div class="setting-row">
      <label>视角灵敏度</label>
      <input type="range" id="sensitivity" min="0.2" max="3.0" step="0.1" value="1.0">
      <span id="sens-val">1.0</span>
    </div>
    <button id="enter-btn">点击进入</button>
    <p>WASD 移动 &nbsp;·&nbsp; Shift 加速 &nbsp;·&nbsp; 鼠标转动视角 &nbsp;·&nbsp; ESC 退出</p>
  </div>

  <!-- 准星 -->
  <div id="crosshair"></div>

  <!-- 交互提示 -->
  <div id="interact-hint">⬜ 按 [空格] 交互</div>

  <!-- 卡牌 2D 界面 -->
  <div id="card-ui">
    <div class="rainbow-bg"></div>
    <div class="rainbow-lines"></div>

    <!-- 顶部按钮行 -->
    <div class="ui-buttons">
      <button class="ui-btn" id="btn-exit">✕</button>
      <button class="ui-btn" id="btn-draw">抽卡</button>
      <button class="ui-btn" id="btn-container">容器</button>
    </div>

    <!-- 抽卡子面板（2列网格）-->
    <div id="panel-draw" class="panel" style="display:none">
      <div class="panel-grid">
        <button class="ui-btn loc-btn" data-loc="常规零号大坝">常规零号大坝</button>
        <button class="ui-btn loc-btn" data-loc="机密巴克十">机密巴克十</button>
        <button class="ui-btn loc-btn" data-loc="机密航天基地">机密航天基地</button>
        <button class="ui-btn loc-btn" data-loc="绝密巴克十">绝密巴克十</button>
        <button class="ui-btn loc-btn" data-loc="绝密航天基地">绝密航天基地</button>
        <button class="ui-btn loc-btn" data-loc="绝密潮汐监狱">绝密潮汐监狱</button>
      </div>
    </div>

    <!-- 容器子面板（横排）-->
    <div id="panel-container" class="panel" style="display:none">
      <div class="panel-row">
        <button class="ui-btn">常规</button>
        <button class="ui-btn">机密</button>
        <button class="ui-btn">绝密</button>
      </div>
    </div>

    <!-- 集装箱开箱面板 -->
    <div id="panel-shipping" style="display:none">
      <div class="shipping-row" id="shipping-row"></div>
      <button class="ui-btn" id="btn-confirm-ship">✓ 确认收取</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { loadLootData }                           from './js/ui/loot.js';
    import { openShippingPanel, initShippingPanel }   from './js/ui/panel-shipping.js';
    import { updateFootstep }                         from './js/audio/footstep.js';
    import { initParticles, updateParticles }         from './js/player/particles.js';
    import { initScene, initCamera, initRenderer }    from './js/core/scene.js';
    import { initLights }                             from './js/core/lights.js';
    import { initResize }                             from './js/core/resize.js';
    import { initFloor }                              from './js/world/floor.js';
    import { initWalls, BOUND }                       from './js/world/walls.js';
    import { initSkyCubes, updateSkyCubes }           from './js/world/sky-cubes.js';
    import { initCardMesh, getCardMat, getCardMesh }  from './js/world/card-mesh.js';
    import { initControls }                           from './js/player/controls.js';
    import { initMovement, isMoving, isShift,
             updateMovement }                         from './js/player/movement.js';
    import { initRaycaster, checkCardAim,
             isAimingAtCard, resetAim }               from './js/player/raycaster.js';
    import { initCardUI, openCardUI, isCardUIOpen }   from './js/ui/card-ui.js';

    // 预加载战利品数据
    await loadLootData();

    // ── 场景初始化 ────────────────────────────────────────
    const scene    = initScene();
    const camera   = initCamera();
    const renderer = initRenderer();

    initLights(scene);
    initFloor(scene);
    initParticles(scene);
    initWalls(scene, renderer);
    initSkyCubes(scene);
    initCardMesh(scene);

    // ── 控制器与界面 ──────────────────────────────────────
    const controls = initControls(camera, scene, isCardUIOpen);
    initCardUI(controls);
    initShippingPanel();

    document.querySelectorAll('.loc-btn').forEach(btn => {
      btn.addEventListener('click', () => openShippingPanel(btn.dataset.loc));
    });

    // ── 射线检测 ──────────────────────────────────────────
    const interactHint = document.getElementById('interact-hint');
    initRaycaster(camera, getCardMesh(), interactHint);

    // ── 按键（空格交互） ──────────────────────────────────
    initMovement(() => {
      if (controls.isLocked && isAimingAtCard()) openCardUI();
    });

    // ── 窗口自适应 ────────────────────────────────────────
    initResize(camera, renderer);

    // ── 主循环 ────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt     = clock.getDelta();
      const locked = controls.isLocked;

      if (locked) {
        updateMovement(dt, controls, camera, BOUND);
        updateFootstep(dt, isMoving, isShift);
        checkCardAim();
      } else {
        resetAim();
      }

      getCardMat().uniforms.uTime.value += dt;
      updateParticles(dt, locked, isMoving, camera);
      updateSkyCubes(dt);
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
