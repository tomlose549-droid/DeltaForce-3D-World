<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }

    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 100;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: white;
      box-shadow: 0 0 2px rgba(0,0,0,0.8);
    }
    #crosshair::before { width: 20px; height: 2px; top: -1px; left: -10px; }
    #crosshair::after  { width: 2px; height: 20px; top: -10px; left: -1px; }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.62);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 22px;
      color: white;
      font-family: Arial, sans-serif;
      z-index: 200;
      user-select: none;
    }
    #overlay h2 { font-size: 1.9rem; letter-spacing: 3px; }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 0.92rem;
    }
    .setting-row label { width: 90px; text-align: right; color: #ccc; }
    .setting-row input[type="range"] { width: 180px; accent-color: #7af; cursor: pointer; }
    .setting-row span { width: 36px; font-weight: bold; color: #7af; }

    #enter-btn {
      margin-top: 6px;
      padding: 10px 44px;
      font-size: 1rem;
      background: rgba(255,255,255,0.13);
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s;
    }
    #enter-btn:hover { background: rgba(255,255,255,0.24); }

    #overlay p { font-size: 0.85rem; color: #aaa; }
  </style>
</head>
<body>

  <div id="overlay">
    <h2>3D World</h2>
    <div class="setting-row">
      <label>视角灵敏度</label>
      <input type="range" id="sensitivity" min="0.2" max="3.0" step="0.1" value="1.0">
      <span id="sens-val">1.0</span>
    </div>
    <button id="enter-btn">点击进入</button>
    <p>WASD 移动 &nbsp;·&nbsp; Shift 加速 &nbsp;·&nbsp; 鼠标转动视角 &nbsp;·&nbsp; ESC 退出</p>
  </div>

  <div id="crosshair"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // ── 场景 ────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdce3e8);
    scene.fog = new THREE.FogExp2(0xdce3e8, 0.008);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 2000);
    camera.position.set(0, 1.7, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.GridHelper(2000, 200, 0x888888, 0x555555));
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));

    // ── 控制 ────────────────────────────────────────────────
    const controls = new PointerLockControls(camera, document.body);
    scene.add(controls.getObject());

    const overlay    = document.getElementById('overlay');
    const enterBtn   = document.getElementById('enter-btn');
    const sensSlider = document.getElementById('sensitivity');
    const sensLabel  = document.getElementById('sens-val');

    controls.pointerSpeed = 1.0;

    sensSlider.addEventListener('input', () => {
      const v = parseFloat(sensSlider.value);
      sensLabel.textContent = v.toFixed(1);
      controls.pointerSpeed = v;
    });

    enterBtn.addEventListener('click', () => controls.lock());
    controls.addEventListener('lock',   () => overlay.style.display = 'none');
    controls.addEventListener('unlock', () => overlay.style.display = 'flex');

    // ── 按键 ────────────────────────────────────────────────
    const keys = new Set();
    document.addEventListener('keydown', e => keys.add(e.code));
    document.addEventListener('keyup',   e => keys.delete(e.code));

    const isMoving = () => keys.has('KeyW') || keys.has('KeyS') || keys.has('KeyA') || keys.has('KeyD');
    const isShift  = () => keys.has('ShiftLeft') || keys.has('ShiftRight');

    // ── 音效 ────────────────────────────────────────────────
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playFootstep() {
      const ctx = ensureAudio();
      const sr  = ctx.sampleRate;
      const len = Math.floor(sr * 0.055);
      const buf = ctx.createBuffer(1, len, sr);
      const d   = buf.getChannelData(0);

      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (len * 0.12));
      }

      const src = ctx.createBufferSource();
      src.buffer = buf;

      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 900;

      const peak = ctx.createBiquadFilter();
      peak.type = 'peaking';
      peak.frequency.value = 2800;
      peak.gain.value = 8;

      const gain = ctx.createGain();
      gain.gain.value = 0.45;

      src.connect(hp);
      hp.connect(peak);
      peak.connect(gain);
      gain.connect(ctx.destination);
      src.start();
    }

    let stepTimer = 0;

    function updateFootstep(dt) {
      if (!isMoving()) { stepTimer = 0; return; }
      const interval = isShift() ? 1 / 3.0 : 1 / 1.5;
      stepTimer += dt;
      if (stepTimer >= interval) {
        stepTimer -= interval;
        playFootstep();
      }
    }

    // ── 粒子 ────────────────────────────────────────────────
    const MAX_P = 800;
    const LIFETIME = 2.0;

    const posArr   = new Float32Array(MAX_P * 3);
    const alphaArr = new Float32Array(MAX_P);

    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    pGeo.setAttribute('alpha',    new THREE.BufferAttribute(alphaArr, 1));

    const pMat = new THREE.ShaderMaterial({
      vertexShader: `
        attribute float alpha;
        varying float vAlpha;
        void main() {
          vAlpha = alpha;
          gl_PointSize = 4.0;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        void main() {
          vec2 c = gl_PointCoord - 0.5;
          if (length(c) > 0.5) discard;
          gl_FragColor = vec4(1.0, 1.0, 1.0, vAlpha);
        }
      `,
      transparent: true,
      depthWrite: false,
    });

    scene.add(new THREE.Points(pGeo, pMat));

    const pool = Array.from({ length: MAX_P }, () => ({
      active: false, x: 0, y: 0, z: 0,
      vx: 0, vy: 0, vz: 0, life: 0,
    }));

    function spawnBatch() {
      const count = Math.floor(Math.random() * 21) + 10;
      let n = 0;
      for (let i = 0; i < MAX_P && n < count; i++) {
        if (pool[i].active) continue;
        const p = pool[i];
        const angle  = Math.random() * Math.PI * 2;
        const radius = Math.random() * 1.5;
        p.active = true;
        p.x = camera.position.x + Math.cos(angle) * radius;
        p.y = 0.05 + Math.random() * 0.1;
        p.z = camera.position.z + Math.sin(angle) * radius;
        p.vx = (Math.random() - 0.5) * 0.6;
        p.vy = Math.random() * 1.2 + 0.4;
        p.vz = (Math.random() - 0.5) * 0.6;
        p.life = 0;
        n++;
      }
    }

    let spawnTimer = 0;
    const SPAWN_INTERVAL = 0.05;

    function updateParticles(dt, locked) {
      if (locked && isMoving()) {
        spawnTimer += dt;
        if (spawnTimer >= SPAWN_INTERVAL) {
          spawnTimer -= SPAWN_INTERVAL;
          spawnBatch();
        }
      } else {
        spawnTimer = 0;
      }

      for (let i = 0; i < MAX_P; i++) {
        const p = pool[i];
        if (!p.active) {
          posArr[i * 3 + 1] = -9999;
          alphaArr[i] = 0;
          continue;
        }
        p.life += dt;
        if (p.life >= LIFETIME) {
          p.active = false;
          posArr[i * 3 + 1] = -9999;
          alphaArr[i] = 0;
          continue;
        }
        p.vy  = Math.max(0, p.vy - 0.5 * dt);
        p.x  += p.vx * dt;
        p.y  += p.vy * dt;
        p.z  += p.vz * dt;

        posArr[i * 3]     = p.x;
        posArr[i * 3 + 1] = p.y;
        posArr[i * 3 + 2] = p.z;
        alphaArr[i] = 1.0 - (p.life / LIFETIME);
      }

      pGeo.attributes.position.needsUpdate = true;
      pGeo.attributes.alpha.needsUpdate    = true;
    }

    // ── 主循环 ──────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt     = clock.getDelta();
      const locked = controls.isLocked;

      if (locked) {
        const speed = isShift() ? 18 : 6;
        const dist  = speed * dt;
        if (keys.has('KeyW')) controls.moveForward(dist);
        if (keys.has('KeyS')) controls.moveForward(-dist);
        if (keys.has('KeyA')) controls.moveRight(-dist);
        if (keys.has('KeyD')) controls.moveRight(dist);
        updateFootstep(dt);
      }

      updateParticles(dt, locked);
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
